<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Scrambled Countries | Party Pixels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/pp-main.css">
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9279891303822612" crossorigin="anonymous"></script>

  <style>
    /* Style dedykowane dla kontenera gry, zintegrowane z pp-main.css */
    .game-layout {
      max-width: 650px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .game-container {
      width: 100%;
      padding: 30px;
      box-sizing: border-box;
      /* Trójwarstwowe tło: neonowy reflektor + ciemny filtr + grafika */
      background-image: 
        radial-gradient(circle at center 40px, rgba(255, 92, 255, 0.75) 45%, transparent 60%),
        linear-gradient(180deg, rgba(10, 14, 35, 0.95), rgba(207, 154, 10, 0.98)),
        url('/images/game-bg.jpg');
      background-size: cover;
      background-position: center;
      background-blend-mode: normal, normal, overlay;;
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(124, 128, 210, 0.15), inset 0 0 20px rgba(0,0,0,0.5);
    }

    .lang-switcher {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      gap: 8px;
    }

    .lang-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    .lang-btn.active {
      background: rgba(0, 240, 255, 0.15);
      color: #00f0ff;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
      border-color: #00f0ff;
    }

    /* HOST SECTION (PIXEL BUDDY) - ANTI-LAYOUT-SHIFT */
    .host-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
      height: 240px; 
      box-sizing: border-box;
    }

    .buddy-avatar {
      height: 130px;
      width: auto;
      object-fit: contain;
      animation: float 3.5s ease-in-out infinite;
      transition: opacity 0.3s ease;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .speech-bubble {
      position: relative;
      background: rgba(18, 1, 54, 0.8);
      border: 2px solid #00f0ff;
      border-radius: 12px;
      padding: 12px 20px;
      color: #00f0ff;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
      margin-top: 15px;
      max-width: 80%;
      min-width: 250px;
      opacity: 1;
      transition: all 0.3s ease;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 0 10px 10px 10px;
      border-style: solid;
      border-color: transparent transparent #00f0ff transparent;
    }

    /* SYSTEM EKRANÓW */
    .screen-segment { display: none !important; animation: fadeIn 0.4s ease-out; }
    .screen-segment.active-screen { display: block !important; }
    .screen-segment.active-screen.setup-grid { display: grid !important; }
    .setup-grid { gap: 20px; }
    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* FORMULARZE I PRZYCISKI */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 12px;
      color: #8a8dad;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: bold;
    }

    .game-input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(0, 240, 255, 0.3);
      background: rgba(4, 5, 14, 0.8);
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
      text-align: center;
    }

    .game-input:focus {
      outline: none;
      border-color: #00f0ff;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    .btn-group { display: flex; gap: 10px; }

    .option-btn {
      flex: 1;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    
    .option-btn.active {
      background: rgba(124, 128, 210, 0.2);
      border-color: #7c80d2;
      color: #00f0ff;
    }

    .primary-btn {
      background: linear-gradient(90deg, #7c80d2, #ff5cff);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 0 5px 20px rgba(255, 92, 255, 0.4);
      width: 100%;
      transition: all 0.2s ease;
    }
    
    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 92, 255, 0.6);
    }

    .primary-btn.alt {
      background: rgba(255,255,255,0.05); 
      box-shadow: none; 
      border: 1px solid rgba(255,255,255,0.2);
      color: #8a8dad;
    }
    
    .primary-btn.alt:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* MECHANIKA ROZGRYWKI */
    .game-header {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      background: rgba(0,0,0,0.3);
      padding: 10px 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .badge-tier {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid #00f0ff;
      color: #00f0ff;
    }

    .scrambled-box {
      font-family: 'Courier New', Courier, monospace;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-align: center;
      margin: 30px 0;
      color: #fff;
      text-shadow: 0 0 15px rgba(255,255,255,0.5);
      transition: color 0.3s, text-shadow 0.3s, transform 0.2s;
    }
    
    .scrambled-box.success {
      color: #00f0ff;
      text-shadow: 0 0 20px #00f0ff;
      transform: scale(1.05);
    }

    .scrambled-box.fail {
      color: #ff3366;
      text-shadow: 0 0 20px #ff3366;
    }

    .timer-bar-container {
      background: rgba(255,255,255,0.05);
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .timer-bar {
      background: linear-gradient(90deg, #00f0ff, #ff5cff);
      height: 100%;
      width: 100%;
      transition: width 0.1s linear;
      box-shadow: 0 0 10px #ff5cff;
    }

    .players-list {
      display: grid;
      gap: 12px;
      margin: 20px 0;
    }
    
    .player-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(124, 128, 210, 0.3);
      border-radius: 12px;
      font-size: 16px;
    }
    
    .score-btn {
      background: #7c80d2;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      text-transform: uppercase;
      font-size: 12px;
    }
    
    .score-btn:hover {
      background: #00f0ff;
      color: #000;
      box-shadow: 0 0 15px #00f0ff;
    }
  </style>
</head>

<body>
  <div class="page">

    <div id="header" style="margin-bottom: 40px;"></div>

    <div class="game-layout">
      <div class="game-container">
        
        <div class="lang-switcher">
          <button id="langBtnEN" class="lang-btn active" onclick="setLanguage('en')">EN</button>
          <button id="langBtnPL" class="lang-btn" onclick="setLanguage('pl')">PL</button>
        </div>

        <div class="host-section">
          <img id="pixelBuddyImg" class="buddy-avatar" src="/images/buddy-neutral.png" alt="Pixel Buddy">
          <div id="buddyBubble" class="speech-bubble">System online. Ready to play?</div>
        </div>

        <div id="introScreen" class="screen-segment active-screen" style="text-align: center;">
          <div id="rulesWrapper" style="background: rgba(0,0,0,0.25); padding: 20px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; text-align: left; line-height: 1.6; color: #8a8dad; font-size: 14px;">
            </div>
          <button class="primary-btn" id="btnBegin" onclick="showSetupScreen()">Begin Game</button>
        </div>

        <div id="setupScreen" class="screen-segment setup-grid">
          <div class="form-group">
            <label id="lblPlayers">Number of Players</label>
            <div class="btn-group">
              <button class="option-btn active" onclick="setPlayers(1)">1</button>
              <button class="option-btn" onclick="setPlayers(2)">2</button>
              <button class="option-btn" onclick="setPlayers(3)">3</button>
            </div>
          </div>

          <div id="nameInputs" class="form-group">
            <label id="lblPlayerNames">Player Name</label>
            <input type="text" id="p1Name" class="game-input" value="Player 1">
          </div>

          <div class="form-group">
            <label id="lblTargetScore">Points to Win</label>
            <div class="btn-group">
              <button class="option-btn active" onclick="setTarget(3)">3</button>
              <button class="option-btn" onclick="setTarget(5)">5</button>
              <button class="option-btn" onclick="setTarget(10)">10</button>
            </div>
          </div>

          <button class="primary-btn" id="btnStart" onclick="startGame()" style="margin-top: 10px;">Start Game</button>
        </div>

        <div id="gameScreen" class="screen-segment">
          <div class="game-header">
            <span id="tierBadge" class="badge-tier">Tier 1: Easy</span>
            <span id="gameInfo" style="font-size: 13px; color: #8a8dad; font-weight: bold;">Word 1</span>
          </div>

          <div id="scrambledWord" class="scrambled-box">XXXXXX</div>

          <div id="timerContainer" class="timer-bar-container">
            <div id="timerBar" class="timer-bar"></div>
          </div>

          <div id="singlePlayerInput" class="form-group">
            <input type="text" id="soloAnswer" class="game-input" placeholder="Type country name..." autocomplete="off">
          </div>

          <div id="multiPlayerList" class="players-list hidden"></div>

          <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 12px;">
            <button class="primary-btn hidden" id="btnReveal" onclick="revealAnswer()">Reveal Answer</button>
            <button class="primary-btn alt" id="btnNext" onclick="skipOrNextWord()">Skip Word</button>
          </div>
        </div>

        <div id="endScreen" class="screen-segment" style="text-align: center;">
          <h2 id="endTitle" style="font-size: 32px; margin-bottom: 15px; color: #ff5cff;">Game Over</h2>
          <div id="endResults" style="color: #fff; margin-bottom: 30px; font-size: 18px; line-height: 1.8; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);"></div>
          <button class="primary-btn" id="btnRestart" onclick="resetGame()">Play Again</button>
        </div>
      </div>
    </div>

    <div id="footer" style="margin-top: 40px;"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/pp-auth.js"></script>

  <script>
    function loadPart(id, file) {
      fetch(file)
        .then(res => res.text())
        .then(html => {
          document.getElementById(id).innerHTML = html;
        })
        .catch(err => console.error(`Load error in ${file}:`, err));
    }

    loadPart("header", "/header.html");
    loadPart("footer", "/footer.html");
  </script>

  <script src="/tipjar.js"></script>

  <script>
    const buddyQuotes = {
      en: {
        welcome: ["System online. Ready to play?", "Let's crack some codes!", "I'm your host, Pixel Buddy!"],
        neutral: ["Unscramble this one!", "Processing letters...", "What country is hiding here?"],
        happy: ["Nailed it!", "Perfect match!", "System bypassed! 1 Point!", "You're a genius!"],
        sad: ["Time's up! Error 404.", "Oh no, system crashed!", "Glitch detected!", "Too slow!"],
        thinking: ["Who's getting the point?", "Analyzing data...", "Host is waiting for results..."],
        win: ["We have a champion!", "Party successful!", "Mission accomplished!"]
      },
      pl: {
        welcome: ["System połączony. Zaczynamy?", "Rozwiążmy kilka szyfrów!", "Jestem Pixel Buddy, gramy!"],
        neutral: ["Rozszyfruj to państwo!", "Analizowanie liter...", "Jaki kraj tu się ukrywa?"],
        happy: ["Genialnie!", "Idealnie!", "System odblokowany! Punkt!", "Jesteś mistrzem!"],
        sad: ["Czas minął! Błąd 404.", "O nie, awaria systemu!", "Wykryto glitch!", "Za wolno!"],
        thinking: ["Kto zdobędzie punkt?", "Analizowanie danych...", "Host czeka na werdykt..."],
        win: ["Mamy zwycięzcę!", "Party zakończone sukcesem!", "Misja wykonana!"]
      }
    };

    const i18n = {
      en: {
        begin: "Begin Game",
        rules: "<b style='color:#00f0ff; font-size:16px; display:block; margin-bottom:10px;'>How to Play:</b>1. Rearrange the scrambled letters to guess the correct country name.<br><br>2. <b>Solo Mode:</b> Type your answers directly into the box. You must submit before the countdown bar empties!<br><br>3. <b>Multiplayer Mode:</b> Play locally on one screen. Read the scrambled word, shout the answer, then click 'Reveal Answer' to award a point manually.<br><br>4. <b>Dynamic Scaling:</b> The closer you get to the target score, the higher the tier difficulty and the faster the clock ticks!",
        players: "Number of Players", names: "Player Name(s)", target: "Points to Win",
        start: "Start Game", next: "Next Word", skip: "Skip Word", reveal: "Reveal Answer", 
        restart: "Play Again", easy: "Tier 1: Easy", medium: "Tier 2: Medium", 
        hard: "Tier 3: Hard (Fast)", word: "Word", win: "Victory!", over: "Game Over", 
        placeholder: "Type country name...", score: "Score"
      },
      pl: {
        begin: "Rozpocznij Grę",
        rules: "<b style='color:#00f0ff; font-size:16px; display:block; margin-bottom:10px;'>Zasady Gry:</b>1. Uporządkuj rozsypane litery, aby odgadnąć właściwą nazwę państwa.<br><br>2. <b>Tryb Solo:</b> Wpisuj odpowiedzi w okienko. Musisz trafić, zanim pasek czasu zejdzie do zera!<br><br>3. <b>Tryb Wielu Graczy:</b> Grajcie lokalnie przy jednym ekranie. Kto pierwszy odgadnie słowo na głos, zgłasza się, a host klika 'Sprawdź Odpowiedź' i ręcznie dodaje mu punkt.<br><br>4. <b>Skalowanie Trudności:</b> Im bliżej wygranej jesteście, tym trudniejsze dostaniecie państwa, a czas zacznie uciekać znacznie szybciej!",
        players: "Liczba Graczy", names: "Imię Gracza (Graczy)", target: "Punkty do Wygranej",
        start: "Uruchom Grę", next: "Następne Słowo", skip: "Pomiń Słowo", reveal: "Sprawdź Odpowiedź", 
        restart: "Zagraj Ponownie", easy: "Etap 1: Łatwy", medium: "Etap 2: Średni", 
        hard: "Etap 3: Trudny (Szybka runda)", word: "Słowo", win: "Zwycięstwo!", over: "Koniec Czasu!", 
        placeholder: "Wpisz nazwę kraju...", score: "Wynik"
      }
    };

    const database = {
      en: {
        easy: ["POLAND", "SPAIN", "ITALY", "BRAZIL", "FRANCE", "JAPAN", "CANADA", "EGYPT"],
        medium: ["MEXICO", "VIETNAM", "UKRAINE", "MOROCCO", "ICELAND", "COLOMBIA", "FINLAND"],
        hard: ["BHUTAN", "LESOTHO", "VANUATU", "SURINAME", "MALTA", "OMAN", "ANDORRA"]
      },
      pl: {
        easy: ["POLSKA", "HISZPANIA", "WLOCHY", "BRAZYLIA", "FRANCJA", "JAPONIA", "KANADA", "EGIPT"],
        medium: ["MEKSYK", "WIETNAM", "UKRAINA", "MAROKO", "ISLANDIA", "KOLUMBIA", "FINLANDIA"],
        hard: ["BUTAN", "LESOTHO", "VANUATU", "SURINAM", "MALTA", "OMAN", "ANDORRA"]
      }
    };

    let lang = 'en';
    let config = { players: 1, targetScore: 3, names: ["Player 1"] };
    let gameState = {
      scores: [0, 0, 0],
      currentTier: 'easy',
      roundIndex: 0,
      currentAnswer: "",
      timer: null,
      multiPhase: 'guessing',
      inputFrozen: false,
      activePools: null,
      scoredPlayers: []
    };

    function setBuddyState(state, customText = null) {
      const img = document.getElementById('pixelBuddyImg');
      const bubble = document.getElementById('buddyBubble');
      
      let fileSuffix = state;
      if (state === 'welcome') fileSuffix = 'neutral';
      if (state === 'win') fileSuffix = 'happy';
      
      img.src = `/images/buddy-${fileSuffix}.png`;

      let text = customText;
      if (!text) {
        let pool = buddyQuotes[lang][state];
        text = pool[Math.floor(Math.random() * pool.length)];
      }
      
      bubble.style.opacity = 0;
      setTimeout(() => {
        bubble.textContent = text;
        bubble.style.opacity = 1;
      }, 200);
    }

    function setLanguage(l) {
      lang = l;
      document.getElementById('langBtnEN').classList.toggle('active', l === 'en');
      document.getElementById('langBtnPL').classList.toggle('active', l === 'pl');
      
      document.getElementById('rulesWrapper').innerHTML = i18n[lang].rules;
      document.getElementById('btnBegin').textContent = i18n[lang].begin;
      document.getElementById('lblPlayers').textContent = i18n[lang].players;
      document.getElementById('lblPlayerNames').textContent = i18n[lang].names;
      document.getElementById('lblTargetScore').textContent = i18n[lang].target;
      document.getElementById('btnStart').textContent = i18n[lang].start;
      document.getElementById('btnRestart').textContent = i18n[lang].restart;
      document.getElementById('btnReveal').textContent = i18n[lang].reveal;
      document.getElementById('soloAnswer').placeholder = i18n[lang].placeholder;
      
      if (document.getElementById('gameScreen').classList.contains('active-screen')) {
        document.getElementById('btnNext').textContent = config.players === 1 ? i18n[lang].skip : i18n[lang].next;
      }
      setBuddyState('welcome');
      if (config.players > 1) renderMultiplayerList();
    }

    function showSetupScreen() {
      document.getElementById('introScreen').classList.remove('active-screen');
      document.getElementById('setupScreen').classList.add('active-screen', 'setup-grid');
      setBuddyState('neutral');
      
      // Auto-scroll do góry
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setPlayers(num) {
      config.players = num;
      const btns = document.querySelectorAll('#setupScreen .form-group:nth-child(1) .option-btn');
      btns.forEach((b, i) => b.classList.toggle('active', i + 1 === num));

      let html = '';
      for(let i = 1; i <= num; i++) {
        html += `<input type="text" id="p${i}Name" class="game-input" value="Player ${i}" style="margin-bottom:8px;">`;
      }
      document.getElementById('nameInputs').innerHTML = `<label>${i18n[lang].names}</label>` + html;
    }

    function setTarget(score) {
      config.targetScore = score;
      const targets = [3, 5, 10];
      const btns = document.querySelectorAll('#setupScreen .form-group:nth-child(3) .option-btn');
      btns.forEach((b, i) => b.classList.toggle('active', targets[i] === score));
    }

    function scramble(word) {
      let scrambled = '';
      let attempts = 0;
      while ((scrambled === '' || scrambled === word) && attempts < 20) {
        let arr = word.split('');
        for (let pass = 0; pass < 2; pass++) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            let temp = arr[i];
            arr[i] = arr[j];
            arr[j] = temp;
          }
        }
        scrambled = arr.join('');
        attempts++;
      }
      return scrambled;
    }

    function startGame() {
      config.names = [];
      for(let i = 1; i <= config.players; i++) {
        let inputEl = document.getElementById(`p${i}Name`);
        let val = inputEl ? inputEl.value.trim() : "";
        config.names.push(val || `Player ${i}`);
      }

      gameState.scores = [0, 0, 0];
      gameState.currentTier = 'easy';
      gameState.roundIndex = 0;
      gameState.scoredPlayers = [];

      gameState.activePools = {
        easy: [...database[lang].easy],
        medium: [...database[lang].medium],
        hard: [...database[lang].hard]
      };

      document.getElementById('setupScreen').classList.remove('active-screen', 'setup-grid');
      document.getElementById('gameScreen').classList.add('active-screen');

      if(config.players > 1) {
        document.getElementById('timerContainer').classList.add('hidden');
        document.getElementById('singlePlayerInput').classList.add('hidden');
        document.getElementById('multiPlayerList').classList.remove('hidden');
      } else {
        document.getElementById('timerContainer').classList.remove('hidden');
        document.getElementById('singlePlayerInput').classList.remove('hidden');
        document.getElementById('multiPlayerList').classList.add('hidden');
        setupSoloInputListener();
      }

      // Auto-scroll do góry ekranu gry
      window.scrollTo({ top: 0, behavior: 'smooth' });

      loadQuestion();
    }

    function loadQuestion() {
      gameState.inputFrozen = false;
      gameState.scoredPlayers = []; 
      
      let dynamicInterval = config.targetScore / 3;
      if (gameState.roundIndex < dynamicInterval) {
        gameState.currentTier = 'easy';
      } else if (gameState.roundIndex < dynamicInterval * 2) {
        gameState.currentTier = 'medium';
      } else {
        gameState.currentTier = 'hard';
      }

      if (gameState.activePools[gameState.currentTier].length === 0) {
        if (gameState.activePools.easy.length > 0) gameState.currentTier = 'easy';
        else if (gameState.activePools.medium.length > 0) gameState.currentTier = 'medium';
        else if (gameState.activePools.hard.length > 0) gameState.currentTier = 'hard';
        else { endByLimit(); return; }
      }

      let pool = gameState.activePools[gameState.currentTier];
      let tierTxt = i18n[lang].easy;
      if(gameState.currentTier === 'medium') tierTxt = i18n[lang].medium;
      if(gameState.currentTier === 'hard') tierTxt = i18n[lang].hard;
      
      document.getElementById('tierBadge').textContent = tierTxt;
      document.getElementById('gameInfo').textContent = `${i18n[lang].word} ${gameState.roundIndex + 1}`;

      let randomIndex = Math.floor(Math.random() * pool.length);
      let word = pool.splice(randomIndex, 1)[0]; 
      gameState.currentAnswer = word;
      
      let wordBox = document.getElementById('scrambledWord');
      wordBox.textContent = scramble(word);
      wordBox.className = 'scrambled-box';

      document.getElementById('soloAnswer').value = "";
      document.getElementById('soloAnswer').disabled = false;
      gameState.multiPhase = 'guessing';
      
      setBuddyState('neutral');

      if (config.players > 1) {
        document.getElementById('btnReveal').classList.remove('hidden');
        document.getElementById('btnNext').classList.add('hidden');
        document.getElementById('btnNext').textContent = i18n[lang].next;
        renderMultiplayerList();
      } else {
        document.getElementById('btnReveal').classList.add('hidden');
        document.getElementById('btnNext').classList.remove('hidden');
        document.getElementById('btnNext').textContent = i18n[lang].skip;
        document.getElementById('soloAnswer').focus();
        startTimer();
      }
    }

    function startTimer() {
      clearInterval(gameState.timer);
      let baseSeconds = config.targetScore === 3 ? 20 : (config.targetScore === 5 ? 15 : 12);
      if (gameState.currentTier === 'hard') baseSeconds = Math.round(baseSeconds * 0.6);

      let duration = baseSeconds * 1000;
      let start = Date.now();

      gameState.timer = setInterval(() => {
        let elapsed = Date.now() - start;
        let progress = 100 - (elapsed / duration * 100);
        
        if (progress <= 0) {
          clearInterval(gameState.timer);
          document.getElementById('timerBar').style.width = '0%';
          handleSoloFail();
        } else {
          document.getElementById('timerBar').style.width = progress + '%';
        }
      }, 100);
    }

    function setupSoloInputListener() {
      const input = document.getElementById('soloAnswer');
      const newInput = input.cloneNode(true);
      input.parentNode.replaceChild(newInput, input);

      newInput.addEventListener('input', (e) => {
        if(gameState.inputFrozen) return;
        let val = e.target.value.trim().toUpperCase();
        if (val === gameState.currentAnswer) {
          handleSoloSuccess();
        }
      });
    }

    function handleSoloSuccess() {
      clearInterval(gameState.timer);
      gameState.inputFrozen = true;
      document.getElementById('soloAnswer').disabled = true;
      
      let wordBox = document.getElementById('scrambledWord');
      wordBox.textContent = gameState.currentAnswer;
      wordBox.classList.add('success');
      
      setBuddyState('happy');
      gameState.scores[0]++;

      setTimeout(() => {
        if (gameState.scores[0] >= config.targetScore) {
          endGame(config.names[0]);
        } else {
          gameState.roundIndex++;
          loadQuestion();
        }
      }, 2000);
    }

    function handleSoloFail() {
      gameState.inputFrozen = true;
      document.getElementById('soloAnswer').disabled = true;
      
      let wordBox = document.getElementById('scrambledWord');
      wordBox.textContent = gameState.currentAnswer;
      wordBox.classList.add('fail');
      
      setBuddyState('sad');

      setTimeout(() => {
        gameState.roundIndex++;
        loadQuestion();
      }, 2500);
    }

    function skipOrNextWord() {
      if(config.players === 1 && !gameState.inputFrozen) {
        clearInterval(gameState.timer);
        handleSoloFail();
      } else if (config.players > 1) {
        gameState.roundIndex++;
        loadQuestion();
      }
    }

    function renderMultiplayerList() {
      const list = document.getElementById('multiPlayerList');
      list.innerHTML = '';
      config.names.forEach((name, idx) => {
        let card = document.createElement('div');
        card.className = 'player-card';

        let actionBtn = '';
        if (gameState.multiPhase === 'revealed' && !gameState.scoredPlayers.includes(idx)) {
          actionBtn = `<button class="score-btn" onclick="addPoint(${idx})">+1 PT</button>`;
        }

        card.innerHTML = `
          <div><strong>${name}</strong> <span style="color:#8a8dad; margin-left:10px;">${i18n[lang].score}: ${gameState.scores[idx]}</span></div>
          ${actionBtn}
        `;
        list.appendChild(card);
      });
    }

    function revealAnswer() {
      gameState.multiPhase = 'revealed';
      let wordBox = document.getElementById('scrambledWord');
      wordBox.textContent = gameState.currentAnswer;
      wordBox.classList.add('success');

      setBuddyState('thinking');
      document.getElementById('btnReveal').classList.add('hidden');
      document.getElementById('btnNext').classList.remove('hidden');
      renderMultiplayerList();
    }

    function addPoint(idx) {
      if (gameState.multiPhase !== 'revealed' || gameState.scoredPlayers.includes(idx)) return; 
      
      gameState.scoredPlayers.push(idx); 
      gameState.scores[idx]++;
      
      setBuddyState('happy');
      renderMultiplayerList();
      
      setTimeout(() => {
        if (gameState.scores[idx] >= config.targetScore) {
          endGame(config.names[idx]);
        }
      }, 1000);
    }

    function endByLimit() {
      clearInterval(gameState.timer);
      let maxScore = Math.max(...gameState.scores);
      let winIdx = gameState.scores.indexOf(maxScore);
      endGame(config.names[winIdx]);
    }

    function endGame(winnerName) {
      clearInterval(gameState.timer);
      setBuddyState('win');
      
      document.getElementById('gameScreen').classList.remove('active-screen');
      document.getElementById('endScreen').classList.add('active-screen');
      document.getElementById('endTitle').textContent = i18n[lang].win;
      
      let resHtml = `<strong style="color: #00f0ff; font-size: 22px;">Winner: ${winnerName}</strong><br><br>`;
      config.names.forEach((name, idx) => {
        resHtml += `${name}: <span style="color:#ff5cff; font-weight:bold;">${gameState.scores[idx]}</span> pts<br>`;
      });
      document.getElementById('endResults').innerHTML = resHtml;
    }

    function resetGame() {
      setBuddyState('welcome');
      document.getElementById('endScreen').classList.remove('active-screen');
      document.getElementById('introScreen').classList.add('active-screen');
      
      // Auto-scroll do góry przy powrocie
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Inicjalizacja języka na start
    setLanguage('en');
  </script>
</body>
</html>
