<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Scrambled Countries | Party Pixels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Unscramble letters to find the correct country. Play solo against time or host a multiplayer party battle!">
  <link rel="stylesheet" href="/pp-main.css">
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9279891303822612"
     crossorigin="anonymous"></script>

  <style>
    /* Stylowanie w klimacie Party Pixels */
    .game-container {
      max-width: 650px;
      margin: 40px auto;
      padding: 24px;
      background: 
        radial-gradient(circle at top, rgba(255, 92, 255, 0.15), transparent 60%),
        linear-gradient(145deg, rgba(10, 14, 35, 0.98), rgba(4, 5, 14, 0.99));
      border: 1px solid rgba(124, 128, 210, 0.25);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .lang-switcher {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
    }

    .lang-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text, #fff);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }
    .lang-btn.active {
      background: #ff5cff;
      color: #000;
      box-shadow: 0 0 10px #ff5cff;
      border-color: #ff5cff;
    }

    /* System zarządzania ekranami */
    .screen-segment { display: none !important; }
    .screen-segment.active-screen { display: grid !important; }
    .screen-segment.active-screen.game-layout { display: block !important; }
    .hidden { display: none !important; }

    .setup-grid { display: grid; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 11px; color: #8a8dad; text-transform: uppercase; letter-spacing: 0.1em;
    }

    .game-input {
      padding: 12px; border-radius: 10px; border: 1px solid rgba(90,94,170,0.5);
      background: rgba(7,9,26,0.8); color: #fff;
    }

    .btn-group { display: flex; gap: 8px; }
    .option-btn {
      flex: 1; padding: 10px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); color: #fff;
      border-radius: 10px; cursor: pointer; transition: 0.2s;
    }
    .option-btn.active {
      background: rgba(124, 128, 210, 0.2); border-color: #7c80d2;
    }

    .primary-btn {
      background: radial-gradient(circle at top, #ff5cff, #7c80d2);
      color: #fff; border: none; padding: 14px; border-radius: 999px;
      font-weight: bold; cursor: pointer; text-transform: uppercase;
      letter-spacing: 0.05em; box-shadow: 0 4px 15px rgba(255, 92, 255, 0.3);
      width: 100%; transition: 0.2s;
    }
    .primary-btn.alt {
      background: rgba(255,255,255,0.08); box-shadow: none; border: 1px solid rgba(255,255,255,0.1);
    }

    /* Ekran Gry */
    .scrambled-box {
      font-size: 38px; font-weight: 900; letter-spacing: 0.15em;
      text-align: center; margin: 25px 0; color: #fff;
      text-shadow: 0 0 15px rgba(255,255,255,0.4); transition: color 0.3s, text-shadow 0.3s;
    }

    .timer-bar-container {
      background: rgba(255,255,255,0.1); height: 8px; border-radius: 999px;
      overflow: hidden; margin-bottom: 20px;
    }
    .timer-bar {
      background: #ff5cff; height: 100%; width: 100%;
      transition: width 0.1s linear; box-shadow: 0 0 8px #ff5cff;
    }

    .players-list { display: grid; gap: 12px; margin: 20px 0; }
    .player-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 18px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
    }
    
    .score-btn {
      border: none; color: white; padding: 8px 14px; border-radius: 6px;
      cursor: pointer; font-weight: bold; transition: 0.2s; min-width: 90px;
    }
    .score-btn.btn-ready {
      background: transparent; border: 1px solid #7c80d2; color: #7c80d2;
    }
    .score-btn.btn-ready:hover { background: rgba(124, 128, 210, 0.1); }
    
    .score-btn.btn-checked {
      background: #4ade80; color: #000; box-shadow: 0 0 10px #4ade80; border: 1px solid #4ade80; cursor: default;
    }
    .score-btn.btn-point {
      background: #7c80d2; border: 1px solid #7c80d2;
    }

    .badge-tier {
      display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 10px;
      text-transform: uppercase; background: rgba(255,92,255,0.15);
      border: 1px solid #ff5cff; color: #ff5cff;
    }
  </style>
</head>
