<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WNO Helper</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">WNO HELPER</div>
  <button id="resetBtn" class="hidden">Nowa gra</button>
</header>

<main>

<section id="setup">
<h2>Start gry</h2>

<label>Liczba graczy
<select id="playerCount">
<option value="2">2</option>
<option value="3">3</option>
<option value="4" selected>4</option>
<option value="5">5</option>
</select>
</label>

<label>Startowe HP
<input id="startHP" type="number" value="12">
</label>

<div id="playerNames"></div>

<button id="startBtn">Start gry</button>

</section>


<section id="game" class="hidden">

<div class="status">
<span>Runda <b id="round">1</b></span>
<span>Tura: <b id="currentPlayer">—</b></span>
</div>

<div id="players" class="players"></div>

<div class="controls">
<button id="nextTurn">Następny gracz</button>
<button id="undo">Cofnij</button>
</div>

</section>

</main>

<script src="app.js"></script>
</body>
</html>
