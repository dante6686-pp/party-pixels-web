<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Neon Matrix Clicker | Party Pixels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/pp-main.css">
  
  <style>
    /* ... (Style pozostają te same co wcześniej) ... */
    .game-layout { max-width: 650px; width: 100%; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }
    .game-container { width: 100%; padding: 30px; box-sizing: border-box; background-image: radial-gradient(circle at center 40px, rgba(0, 240, 255, 0.25) 45%, transparent 60%), linear-gradient(145deg, rgba(15, 5, 30, 0.95), rgba(5, 2, 12, 0.98)), url('/images/matrix-bg.png'); background-size: cover; background-position: center; background-blend-mode: overlay; border: 1px solid rgba(255, 51, 102, 0.2); border-radius: 20px; box-shadow: 0 0 30px rgba(255, 51, 102, 0.15), inset 0 0 20px rgba(0,0,0,0.5); }
    .host-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; height: 240px; box-sizing: border-box; }
    .buddy-avatar { height: 130px; width: auto; object-fit: contain; animation: float 3.5s ease-in-out infinite; transition: opacity 0.3s ease; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0px); } }
    .speech-bubble { position: relative; background: rgba(25, 5, 30, 0.85); border: 2px solid #ff3366; border-radius: 12px; padding: 12px 20px; color: #ff3366; font-family: 'Courier New', Courier, monospace; font-weight: bold; text-align: center; box-shadow: 0 0 15px rgba(255, 51, 102, 0.3); margin-top: 15px; max-width: 80%; min-width: 250px; opacity: 1; transition: all 0.3s ease; }
    .speech-bubble::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); border-width: 0 10px 10px 10px; border-style: solid; border-color: transparent transparent #ff3366 transparent; }
    .screen-segment { display: none !important; animation: fadeIn 0.4s ease-out; }
    .screen-segment.active-screen { display: block !important; }
    .screen-segment.active-screen.setup-grid { display: grid !important; }
    .setup-grid { gap: 20px; }
    .hidden { display: none !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 12px; color: #a09cb0; text-transform: uppercase; letter-spacing: 0.1em; font-weight: bold; }
    .game-input { padding: 14px; border-radius: 10px; border: 1px solid rgba(255, 51, 102, 0.3); background: rgba(10, 3, 15, 0.8); color: #fff; font-size: 16px; transition: all 0.3s ease; text-align: center; }
    .btn-group { display: flex; gap: 10px; }
    .option-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .option-btn.active { background: rgba(255, 51, 102, 0.2); border-color: #ff3366; color: #00f0ff; }
    .primary-btn { background: linear-gradient(90deg, #ff3366, #ff5cff); color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; box-shadow: 0 5px 20px rgba(255, 51, 102, 0.4); width: 100%; transition: all 0.2s ease; }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 51, 102, 0.6); }
    .game-header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255, 51, 102, 0.15); }
    .badge-tier { display: inline-block; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; background: rgba(255, 51, 102, 0.1); border: 1px solid #ff3366; color: #ff3366; }
    .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px auto; max-width: 320px; width: 100%; }
    .matrix-node { aspect-ratio: 1; background: rgba(255, 255, 255, 0.02); border: 2px solid rgba(255, 51, 102, 0.15); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: all 0.1s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    .matrix-node.node-glitch { background: rgba(0, 240, 255, 0.2) !important; border-color: #00f0ff !important; box-shadow: 0 0 20px rgba(0, 240, 255, 0.6), inset 0 0 5px #fff; }
    .matrix-node.node-mine { background: rgba(255, 51, 102, 0.3) !important; border-color: #ff3366 !important; box-shadow: 0 0 20px rgba(255, 51, 102, 0.7); }
    .timer-bar-container { background: rgba(255,255,255,0.05); height: 10px; border-radius: 999px; overflow: hidden; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
    .timer-bar { background: linear-gradient(90deg, #00f0ff, #ff3366); height: 100%; width: 100%; transition: width 0.1s linear; }
  </style>
</head>
<body>
  <div class="page">
    <div id="header" style="margin-bottom: 40px;"></div>
    <div class="game-layout">
      <div class="game-container">
        <!-- (Sekcje Intro i Setup jak wcześniej...) -->
        <div class="lang-switcher">
          <button id="langBtnEN" class="lang-btn active" onclick="setLanguage('en')">EN</button>
          <button id="langBtnPL" class="lang-btn" onclick="setLanguage('pl')">PL</button>
        </div>

        <div class="host-section">
          <img id="pixelBuddyImg" class="buddy-avatar" src="/images/buddy-neutral.png" alt="Pixel Buddy">
          <div id="buddyBubble" class="speech-bubble">Matrix initialized.</div>
        </div>

        <div id="introScreen" class="screen-segment active-screen" style="text-align: center;">
          <div id="rulesWrapper" style="background: rgba(0,0,0,0.25); padding: 20px; border-radius: 14px; border: 1px solid rgba(251,51,102,0.15); margin-bottom: 25px; text-align: left; line-height: 1.6; color: #a09cb0; font-size: 14px;"></div>
          <button class="primary-btn" id="btnBegin" onclick="showSetupScreen()">Begin Mission</button>
        </div>

        <div id="setupScreen" class="screen-segment setup-grid">
           <!-- (pola wyboru graczy...) -->
          <button class="primary-btn" id="btnStart" onclick="startGame()">Connect to Matrix</button>
        </div>

        <div id="gameScreen" class="screen-segment">
          <div class="game-header"><span id="gameModeBadge" class="badge-tier">Solo</span><span id="gameScoreInfo" style="font-size: 13px; color: #a09cb0; font-weight: bold;">Glitches: 0</span></div>
          <div id="timerContainer" class="timer-bar-container"><div id="timerBar" class="timer-bar"></div></div>
          <div class="matrix-grid">
            <div class="matrix-node" data-id="0" onclick="handleNodeClick(0)"></div><div class="matrix-node" data-id="1" onclick="handleNodeClick(1)"></div><div class="matrix-node" data-id="2" onclick="handleNodeClick(2)"></div>
            <div class="matrix-node" data-id="3" onclick="handleNodeClick(3)"></div><div class="matrix-node" data-id="4" onclick="handleNodeClick(4)"></div><div class="matrix-node" data-id="5" onclick="handleNodeClick(5)"></div>
            <div class="matrix-node" data-id="6" onclick="handleNodeClick(6)"></div><div class="matrix-node" data-id="7" onclick="handleNodeClick(7)"></div><div class="matrix-node" data-id="8" onclick="handleNodeClick(8)"></div>
          </div>
        </div>

        <div id="endScreen" class="screen-segment" style="text-align: center;">
          <h2 id="endTitle" style="font-size: 32px; margin-bottom: 15px; color: #ff3366;">GAME OVER</h2>
          <div id="endResults" style="color: #fff; margin-bottom: 30px; font-size: 18px; line-height: 1.8; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 51, 102, 0.15);"></div>
          <button class="primary-btn" onclick="resetGame()">Try Again</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ... (część logiki z poprzedniego pliku) ...
    // ZMIANY W LOGICE:
    function startClock() {
      gameState.timeRemaining = 100;
      clearInterval(gameState.gameTimer);
      // Wolniejszy decay = dłuższa gra
      gameState.gameTimer = setInterval(() => {
        gameState.timeRemaining -= 0.5; // Dłuższy czas
        document.getElementById('timerBar').style.width = gameState.timeRemaining + '%';
        if(gameState.timeRemaining <= 0) handleFinish('success'); // Sukces (koniec czasu)
      }, 100);
    }

    function handleDisconnect(reason) {
      clearInterval(gameState.gameTimer);
      clearTimeout(gameState.logicTimer);
      
      if(reason === 'mine') {
        setBuddyState('sad');
        document.getElementById('endTitle').textContent = "CRASHED (MINE)";
        endGame();
      }
    }

    function handleFinish(reason) {
      clearInterval(gameState.gameTimer);
      setBuddyState('win'); // Pozytywne zakończenie
      document.getElementById('endTitle').textContent = "TIME UP! SYNC COMPLETE";
      endGame();
    }

    function endGame() {
        document.getElementById('gameScreen').classList.remove('active-screen');
        document.getElementById('endScreen').classList.add('active-screen');
        // Tutaj w przyszłości dopiszemy logikę wysyłania wyniku do Supabase (leaderboard)
    }
  </script>
</body>
</html>
